name: Update README Badges

# This workflow uses BYOB (Bring Your Own Badge) to create dynamic badges
# that work with private repositories by hosting badge data in a public repo.
#
# Setup Instructions:
# 1. Create a public repository (e.g., 'ai-dev-kit-badges' or use an existing public repo)
# 2. Create a Personal Access Token with 'repo' scope
# 3. Add the token as a repository secret named 'BADGES_REPO_TOKEN'
# 4. Update the REPOSITORY and ACTOR values below to match your public repo
#
# Badge URLs will be: https://byob.yarr.is/{REPOSITORY}/{badge-name}
# Example: https://byob.yarr.is/earlution/ai-dev-kit-badges/version

on:
  push:
    branches:
      - main
    paths:
      - 'src/fynd_deals/version.py'
      - 'README.md'
      - '**/*.py'  # Trigger on code changes that might affect tests
  workflow_dispatch:
  # Also trigger when tests complete (if you have a test workflow)
  workflow_run:
    workflows: ["Tests"]  # Update this to match your test workflow name
    types:
      - completed

jobs:
  update_badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and detect SemVer strategy
        id: version
        run: |
          # Extract internal version
          INTERNAL_VERSION=$(python3 -c "import sys; sys.path.insert(0, 'src'); from fynd_deals import version; print(version.VERSION_STRING)")
          echo "internal_version=$INTERNAL_VERSION" >> $GITHUB_OUTPUT
          
          # Detect SemVer mapping strategy
          SEMVER_STRATEGY="registry"
          if [ -f "rw-config.yaml" ]; then
            DETECTED_STRATEGY=$(grep "semver_mapping_strategy:" rw-config.yaml | cut -d: -f2 | tr -d ' ')
            if [ "$DETECTED_STRATEGY" = "task_touch" ]; then
              SEMVER_STRATEGY="task_touch"
            fi
          fi
          echo "semver_strategy=$SEMVER_STRATEGY" >> $GITHUB_OUTPUT
          
          # Convert to SemVer if task_touch mode
          if [ "$SEMVER_STRATEGY" = "task_touch" ]; then
            SEMVER_VERSION=$(python3 -c "import sys, os; sys.path.insert(0, 'packages/frameworks/workflow mgt/scripts/version'); from semver_converter import convert_version_string; print(convert_version_string('$INTERNAL_VERSION', 'task_touch'))" 2>/dev/null || echo "$INTERNAL_VERSION")
          else
            SEMVER_VERSION="$INTERNAL_VERSION"
          fi
          echo "semver_version=$SEMVER_VERSION" >> $GITHUB_OUTPUT
          
          echo "Extracted versions:"
          echo "  Internal: $INTERNAL_VERSION"
          echo "  Strategy: $SEMVER_STRATEGY"
          echo "  Display: $SEMVER_VERSION"

      - name: Update version badge
        uses: RubbaBoy/BYOB@v1.3.0
        with:
          name: version
          label: 'version'
          status: ${{ steps.version.outputs.semver_version }}
          color: 007ACC
          icon: 'tag'
          github_token: ${{ secrets.BADGES_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          # For private repo: uncomment and set these to your public repo
          # repository: 'earlution/ai-dev-kit-badges'
          # actor: 'earlution'

      - name: Update license badge
        uses: RubbaBoy/BYOB@v1.3.0
        with:
          name: license
          label: 'license'
          status: 'MIT'
          color: green
          icon: 'scale'
          github_token: ${{ secrets.BADGES_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          # For private repo: uncomment and set these to your public repo
          # repository: 'earlution/ai-dev-kit-badges'
          # actor: 'earlution'

      - name: Update status badge
        uses: RubbaBoy/BYOB@v1.3.0
        with:
          name: status
          label: 'status'
          status: 'active'
          color: success
          icon: 'check-circle'
          github_token: ${{ secrets.BADGES_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          # For private repo: uncomment and set these to your public repo
          # repository: 'earlution/ai-dev-kit-badges'
          # actor: 'earlution'

      - name: Run tests and extract status
        id: test-status
        continue-on-error: true
        run: |
          # Run tests and capture exit code
          if python3 -m pytest --version > /dev/null 2>&1; then
            # pytest is available, run tests
            if python3 -m pytest -v --tb=short 2>&1 | tee test_output.txt; then
              echo "status=passing" >> $GITHUB_OUTPUT
              echo "color=success" >> $GITHUB_OUTPUT
            else
              echo "status=failing" >> $GITHUB_OUTPUT
              echo "color=critical" >> $GITHUB_OUTPUT
            fi
          else
            # No pytest, assume tests not set up yet
            echo "status=not configured" >> $GITHUB_OUTPUT
            echo "color=grey" >> $GITHUB_OUTPUT
          fi

      - name: Update test status badge
        uses: RubbaBoy/BYOB@v1.3.0
        with:
          NAME: tests
          LABEL: 'tests'
          STATUS: ${{ steps.test-status.outputs.status }}
          COLOR: ${{ steps.test-status.outputs.color }}
          ICON: 'check-circle'
          GITHUB_TOKEN: ${{ secrets.BADGES_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          # For private repo: uncomment and set these to your public repo
          # REPOSITORY: 'earlution/ai-dev-kit-badges'
          # ACTOR: 'earlution'

      - name: Extract coverage percentage
        id: coverage
        continue-on-error: true
        run: |
          # Try to extract coverage from pytest-cov or coverage report
          if python3 -m pytest --version > /dev/null 2>&1; then
            # Run tests with coverage
            if python3 -m pytest --cov=. --cov-report=term 2>&1 | tee coverage_output.txt; then
              # Extract coverage percentage from output
              COVERAGE=$(grep -oP 'TOTAL\s+\d+\s+\d+\s+\K\d+%' coverage_output.txt | head -1 || echo "0%")
              if [ -z "$COVERAGE" ] || [ "$COVERAGE" = "0%" ]; then
                # Try alternative extraction
                COVERAGE=$(grep -oP '\d+%' coverage_output.txt | tail -1 || echo "0%")
              fi
              echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
              
              # Determine color based on coverage percentage
              COVERAGE_NUM=$(echo "$COVERAGE" | sed 's/%//')
              if [ "$COVERAGE_NUM" -ge 80 ]; then
                echo "color=success" >> $GITHUB_OUTPUT
              elif [ "$COVERAGE_NUM" -ge 60 ]; then
                echo "color=important" >> $GITHUB_OUTPUT
              else
                echo "color=critical" >> $GITHUB_OUTPUT
              fi
            else
              echo "coverage=0%" >> $GITHUB_OUTPUT
              echo "color=critical" >> $GITHUB_OUTPUT
            fi
          else
            echo "coverage=not configured" >> $GITHUB_OUTPUT
            echo "color=grey" >> $GITHUB_OUTPUT
          fi

      - name: Update coverage badge
        uses: RubbaBoy/BYOB@v1.3.0
        with:
          NAME: coverage
          LABEL: 'coverage'
          STATUS: ${{ steps.coverage.outputs.coverage }}
          COLOR: ${{ steps.coverage.outputs.color }}
          ICON: 'shield'
          GITHUB_TOKEN: ${{ secrets.BADGES_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          # For private repo: uncomment and set these to your public repo
          # REPOSITORY: 'earlution/ai-dev-kit-badges'
          # ACTOR: 'earlution'

      - name: Check code quality
        id: code-quality
        continue-on-error: true
        run: |
          # Try different linting tools in order of preference
          QUALITY_STATUS="not configured"
          QUALITY_COLOR="grey"
          
          # Try ruff first (fast and modern)
          if python3 -m ruff --version > /dev/null 2>&1; then
            if python3 -m ruff check . --output-format=concise 2>&1 | tee quality_output.txt; then
              QUALITY_STATUS="passing"
              QUALITY_COLOR="success"
            else
              # Check if there are only warnings (non-zero exit but not critical)
              ERROR_COUNT=$(grep -c "error" quality_output.txt || echo "0")
              if [ "$ERROR_COUNT" -eq 0 ]; then
                QUALITY_STATUS="warnings"
                QUALITY_COLOR="important"
              else
                QUALITY_STATUS="failing"
                QUALITY_COLOR="critical"
              fi
            fi
          # Try pylint as fallback
          elif python3 -m pylint --version > /dev/null 2>&1; then
            if python3 -m pylint --disable=all --enable=E,F --fail-under=8 . 2>&1 | tee quality_output.txt; then
              QUALITY_STATUS="passing"
              QUALITY_COLOR="success"
            else
              SCORE=$(grep -oP 'rated at \K[\d.]+' quality_output.txt | head -1 || echo "0")
              SCORE_INT=$(echo "$SCORE" | cut -d. -f1)
              if [ "$SCORE_INT" -ge 8 ]; then
                QUALITY_STATUS="warnings"
                QUALITY_COLOR="important"
              else
                QUALITY_STATUS="failing"
                QUALITY_COLOR="critical"
              fi
            fi
          # Try flake8 as last resort
          elif python3 -m flake8 --version > /dev/null 2>&1; then
            if python3 -m flake8 . 2>&1 | tee quality_output.txt; then
              QUALITY_STATUS="passing"
              QUALITY_COLOR="success"
            else
              ERROR_COUNT=$(grep -c "E[0-9]" quality_output.txt || echo "0")
              WARNING_COUNT=$(grep -c "W[0-9]" quality_output.txt || echo "0")
              if [ "$ERROR_COUNT" -eq 0 ] && [ "$WARNING_COUNT" -lt 10 ]; then
                QUALITY_STATUS="warnings"
                QUALITY_COLOR="important"
              else
                QUALITY_STATUS="failing"
                QUALITY_COLOR="critical"
              fi
            fi
          fi
          
          echo "status=$QUALITY_STATUS" >> $GITHUB_OUTPUT
          echo "color=$QUALITY_COLOR" >> $GITHUB_OUTPUT

      - name: Update code quality badge
        uses: RubbaBoy/BYOB@v1.3.0
        with:
          NAME: code-quality
          LABEL: 'code quality'
          STATUS: ${{ steps.code-quality.outputs.status }}
          COLOR: ${{ steps.code-quality.outputs.color }}
          ICON: 'code'
          GITHUB_TOKEN: ${{ secrets.BADGES_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          # For private repo: uncomment and set these to your public repo
          # REPOSITORY: 'earlution/ai-dev-kit-badges'
          # ACTOR: 'earlution'

