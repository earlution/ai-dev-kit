# FR-070 / E5:S09:T06 — Deploy Docusaurus site to GitHub Pages (gh-pages branch).
# Builds in-job (S7) so we never publish a stale portal/build. Same path filters as
# docusaurus-build.yml; also allows workflow_dispatch for manual redeploy.
name: Docusaurus deploy to GitHub Pages

permissions:
  contents: write

# Quote `on` so YAML 1.1 parsers (e.g. PyYAML) do not treat it as boolean true.
"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "portal/**"
      - "docs/**"
      - ".github/workflows/docusaurus-deploy.yml"

defaults:
  run:
    working-directory: portal

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./portal/build
          force_orphan: false
