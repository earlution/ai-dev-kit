[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=cli
    --cov-report=term-missing
    --cov-report=html
markers =
    unit: Unit tests
    integration: Integration tests
    backend: Backend-specific tests
    slow: Slow-running tests
    portal_build: Docusaurus portal production build (run with PORTAL_BUILD=1)

